# fly.toml - Fly.io deployment config for Manthan Layer 1.
#
# Deploy:
#   fly launch --no-deploy          # first time
#   fly secrets set GEMINI_API_KEY=AIza...
#   fly deploy
#
# Free-tier-friendly: one 256 MB VM, Auto-stop when idle.

app = "manthan"
primary_region = "bom"            # Mumbai region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"
  LOG_LEVEL = "info"
  LOG_FORMAT = "json"
  DATA_DIRECTORY = "/app/data"
  GEMINI_MODEL = "gemini-3.1-pro-preview"
  GEMINI_BASE_URL = "https://generativelanguage.googleapis.com/v1beta/openai/"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "manthan_data"
  destination = "/app/data"
