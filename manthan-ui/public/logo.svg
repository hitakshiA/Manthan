<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Manthan: The Churning — three arcs converging into insight -->
  <!-- Outer arc: data flowing in -->
  <path d="M16 4C9.373 4 4 9.373 4 16" stroke="#6E56CF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Middle arc: processing -->
  <path d="M16 8C11.582 8 8 11.582 8 16" stroke="#6E56CF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Inner arc: convergence -->
  <path d="M16 12C13.791 12 12 13.791 12 16" stroke="#6E56CF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- The insight point — where churning produces the answer -->
  <circle cx="16" cy="16" r="2.5" fill="#6E56CF"/>
  <!-- Outward rays — knowledge extracted -->
  <path d="M20 16h6" stroke="#6E56CF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 20v6" stroke="#6E56CF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M19.5 19.5l4 4" stroke="#6E56CF" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
