<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Manthan mark - three right-facing concentric arcs emitting from a
    solid emerald core. Radar/sonar pulse. Designed to read at 16px.
  -->
  <path
    d="M 16 2 A 14 14 0 0 1 16 30"
    stroke="#16d05e"
    stroke-opacity="0.40"
    stroke-width="2"
    stroke-linecap="round"
  />
  <path
    d="M 16 6 A 10 10 0 0 1 16 26"
    stroke="#16d05e"
    stroke-opacity="0.72"
    stroke-width="2.4"
    stroke-linecap="round"
  />
  <path
    d="M 16 11 A 5 5 0 0 1 16 21"
    stroke="#16d05e"
    stroke-width="2.8"
    stroke-linecap="round"
  />
  <circle cx="16" cy="16" r="2.6" fill="#16d05e" />
</svg>
